<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户记录 - HI拿管理系统</title>
    <link rel="stylesheet" href="/admin/static/css/admin.css">
    <style>
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .page-title {
            font-size: 1.6rem;
            font-weight: 600;
            color: #1a1a2e;
        }
        .page-subtitle {
            font-size: 0.9rem;
            color: #999;
            margin-top: 5px;
        }
        .table-container {
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }
        .table-header {
            padding: 20px 25px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }
        .data-table th {
            background: #f8f9fa;
            padding: 15px 20px;
            text-align: left;
            font-weight: 600;
            color: #666;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .data-table td {
            padding: 16px 20px;
            border-bottom: 1px solid #f5f5f5;
            color: #333;
        }
        .data-table tr:hover td {
            background: #f8f9fa;
        }
        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .user-name {
            font-weight: 500;
        }
        .user-openid {
            font-size: 0.75rem;
            color: #999;
            font-family: monospace;
        }
        .filter-group {
            display: flex;
            gap: 10px;
        }
        .filter-select, .filter-input {
            padding: 8px 12px;
            border: 1px solid #eee;
            border-radius: 8px;
            outline: none;
            font-size: 0.9rem;
        }
        .filter-input {
            width: 200px;
        }
        .search-btn {
            padding: 8px 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .empty-state {
            text-align: center;
            padding: 80px 20px;
        }
        .empty-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            opacity: 0.4;
        }
        .empty-text {
            color: #999;
            font-size: 1.1rem;
            margin-bottom: 10px;
        }
        .empty-sub {
            color: #ccc;
            font-size: 0.9rem;
        }
        .time-tag {
            font-size: 0.8rem;
            color: #999;
        }
        .action-link {
            color: #667eea;
            text-decoration: none;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .action-link:hover {
            text-decoration: underline;
        }
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="admin-layout">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-gush">GUSH</span>
                    <span class="logo-app">HI拿</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="/admin/dashboard" class="nav-item">
                    <span class="nav-icon">📊</span>
                    <span>仪表盘</span>
                </a>
                <a href="/admin/customers" class="nav-item">
                    <span class="nav-icon">🏢</span>
                    <span>客户管理</span>
                </a>
                <a href="/admin/codes" class="nav-item">
                    <span class="nav-icon">🎫</span>
                    <span>兑换码</span>
                </a>
                <a href="/admin/machines" class="nav-item">
                    <span class="nav-icon">📱</span>
                    <span>机器管理</span>
                </a>
                <a href="/admin/users" class="nav-item active">
                    <span class="nav-icon">👥</span>
                    <span>用户记录</span>
                </a>
                <a href="/admin/settings" class="nav-item">
                    <span class="nav-icon">⚙️</span>
                    <span>系统设置</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <span class="admin-name">{{ session.get('admin_name', 'Admin') }}</span>
                <a href="/admin/logout" class="logout-btn">退出</a>
            </div>
        </aside>

        <!-- 主内容 -->
        <main class="main-content">
            <div class="page-header">
                <div>
                    <h1 class="page-title">用户记录</h1>
                    <p class="page-subtitle">查看小程序用户领取兑换码的完整记录</p>
                </div>
                <button class="search-btn" onclick="exportUsers()">
                    📥 导出数据
                </button>
            </div>

            <!-- 统计卡片 -->
            <div class="user-stats" id="userStats">
                <div class="user-stat-card">
                    <div class="stat-num" id="totalUsers">-</div>
                    <div class="stat-label">总用户数</div>
                </div>
                <div class="user-stat-card blue">
                    <div class="stat-num" id="activeUsers">-</div>
                    <div class="stat-label">活跃用户</div>
                </div>
                <div class="user-stat-card purple">
                    <div class="stat-num" id="totalClaims">-</div>
                    <div class="stat-label">领取次数</div>
                </div>
                <div class="user-stat-card teal">
                    <div class="stat-num" id="totalRedeems">-</div>
                    <div class="stat-label">核销次数</div>
                </div>
            </div>

            <!-- 数据表格 -->
            <div class="table-container">
                <div class="table-header">
                    <span class="table-title">用户列表</span>
                    <div class="filter-group">
                        <input type="text" class="filter-input" id="searchKeyword" placeholder="搜索OpenID...">
                        <button class="search-btn" onclick="loadUsers(1)">搜索</button>
                    </div>
                </div>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>用户</th>
                            <th>OpenID</th>
                            <th>领取次数</th>
                            <th>核销次数</th>
                            <th>最近领取</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="userList">
                        <tr>
                            <td colspan="6" class="empty-state">
                                <div class="loading-spinner"></div>
                                <div class="empty-text" style="margin-top:15px;">加载中...</div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- 分页 -->
            <div class="pagination" id="pagination"></div>
        </main>
    </div>

    <script>
        let currentPage = 1;
        const limit = 20;

        function loadUsers(page = 1) {
            currentPage = page;
            const keyword = document.getElementById('searchKeyword').value.trim();
            
            document.getElementById('userList').innerHTML = '<tr><td colspan="6" class="empty-state"><div class="loading-spinner"></div><div class="empty-text" style="margin-top:15px;">加载中...</div></td></tr>';

            fetch('/admin/api/users?page=' + page + '&limit=' + limit + (keyword ? '&keyword=' + encodeURIComponent(keyword) : ''))
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        // 更新统计
                        document.getElementById('totalUsers').textContent = data.total || 0;
                        document.getElementById('activeUsers').textContent = data.data ? data.data.length : 0;
                        document.getElementById('totalClaims').textContent = data.total_claims || 0;
                        document.getElementById('totalRedeems').textContent = data.total_redeems || 0;
                        
                        renderUsers(data.data || []);
                        renderPagination(data.total || 0);
                    } else {
                        renderUsers([]);
                    }
                })
                .catch(() => renderUsers([]));
        }

        function renderUsers(users) {
            const tbody = document.getElementById('userList');
            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">👥</div><div class="empty-text">暂无用户记录</div><div class="empty-sub">小程序上线后用户数据将显示在此处</div></div></td></tr>';
                return;
            }

            tbody.innerHTML = users.map(u => {
                const initial = (u.nickname || u.openid || 'U').charAt(0).toUpperCase();
                return '<tr>' +
                    '<td><div class="user-info"><div class="user-avatar">' + initial + '</div><div><div class="user-name">' + (u.nickname || '微信用户') + '</div></div></div></td>' +
                    '<td><span class="user-openid">' + (u.openid || '-') + '</span></td>' +
                    '<td>' + (u.claim_count || 0) + '</td>' +
                    '<td>' + (u.redeem_count || 0) + '</td>' +
                    '<td><span class="time-tag">' + (u.last_claim_at || '-') + '</span></td>' +
                    '<td><span class="action-link" onclick="viewDetail(\'' + (u.openid || '') + '\')">查看详情</span></td>' +
                    '</tr>';
            }).join('');
        }

        function renderPagination(total) {
            const totalPages = Math.ceil(total / limit);
            const container = document.getElementById('pagination');
            
            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }

            let html = '';
            if (currentPage > 1) {
                html += '<button class="action-btn" onclick="loadUsers(' + (currentPage - 1) + ')">上一页</button>';
            }
            html += '<span style="padding: 8px 15px; color: #666;">第 ' + currentPage + ' / ' + totalPages + ' 页，共 ' + total + ' 条</span>';
            if (currentPage < totalPages) {
                html += '<button class="action-btn" onclick="loadUsers(' + (currentPage + 1) + ')">下一页</button>';
            }
            container.innerHTML = html;
        }

        function viewDetail(openid) {
            alert('用户详情功能开发中\nOpenID: ' + openid);
        }

        function exportUsers() {
            alert('导出功能开发中');
        }

        // 搜索回车事件
        document.getElementById('searchKeyword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') loadUsers(1);
        });

        // 初始加载
        loadUsers();
    </script>
</body>
</html>
