<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>兑换码管理 - HI拿管理系统</title>
    <link rel="stylesheet" href="/admin/static/css/admin.css">
</head>
<body>
    <div class="admin-layout">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-gush">GUSH</span>
                    <span class="logo-app">HI拿</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <a href="/dashboard" class="nav-item">
                    <span class="nav-icon">📊</span>
                    <span>仪表盘</span>
                </a>
                <a href="/customers" class="nav-item">
                    <span class="nav-icon">🏢</span>
                    <span>客户管理</span>
                </a>
                <a href="/codes" class="nav-item active">
                    <span class="nav-icon">🎫</span>
                    <span>兑换码</span>
                </a>
                <a href="/machines" class="nav-item">
                    <span class="nav-icon">📱</span>
                    <span>机器管理</span>
                </a>
                <a href="/users" class="nav-item">
                    <span class="nav-icon">👥</span>
                    <span>用户记录</span>
                </a>
                <a href="/settings" class="nav-item">
                    <span class="nav-icon">⚙️</span>
                    <span>系统设置</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <span class="admin-name">{{ session.get('admin_name', 'Admin') }}</span>
                <a href="/admin/logout" class="logout-btn">退出</a>
            </div>
        </aside>

        <!-- 主内容 -->
        <main class="main-content">
            <header class="content-header">
                <h1>兑换码管理</h1>
            </header>

            <div class="toolbar">
                <div class="search-box">
                    <span>🔍</span>
                    <input type="text" id="searchKeyword" placeholder="搜索兑换码">
                </div>
                <div>
                    <select id="statusFilter" class="form-input" style="width: 120px; padding: 8px 12px;">
                        <option value="">全部状态</option>
                        <option value="pending">未使用</option>
                        <option value="used">已使用</option>
                        <option value="expired">已过期</option>
                    </select>
                    <button class="btn btn-primary" onclick="loadCodes()">刷新</button>
                    <button class="btn btn-danger" id="deleteBtn" onclick="deleteSelected()" disabled style="margin-left: 8px;">清空所选</button>
                </div>
            </div>

            <div class="dashboard-card">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th style="width: 40px;"><input type="checkbox" id="selectAll" onchange="toggleSelectAll()"></th>
                            <th>兑换码</th>
                            <th>状态</th>
                            <th>手机号</th>
                            <th>生成时间</th>
                            <th>过期时间</th>
                            <th>使用时间</th>
                        </tr>
                    </thead>
                    <tbody id="codeList">
                        <tr><td colspan="7" class="empty-data"><p>加载中...</p></td></tr>
                    </tbody>
                </table>
            </div>

            <div class="pagination" id="pagination"></div>
        </main>
    </div>

    <script>
        let currentPage = 1;
        const limit = 20;

        function loadCodes(page = 1) {
            currentPage = page;
            const status = document.getElementById('statusFilter').value;
            const keyword = document.getElementById('searchKeyword').value;

            let url = `/admin/api/codes?page=${page}&limit=${limit}`;
            if (status) url += `&status=${status}`;

            fetch(url)
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        renderCodes(data.data);
                        renderPagination(data.total);
                    }
                });
        }

        function renderCodes(codes) {
            const tbody = document.getElementById('codeList');
            if (codes.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="empty-data"><p>暂无数据</p></td></tr>';
                return;
            }

            tbody.innerHTML = codes.map(c => {
                const statusMap = {
                    'pending': '<span class="status-badge status-pending">未使用</span>',
                    'used': '<span class="status-badge status-used">已使用</span>',
                    'expired': '<span class="status-badge status-expired">已过期</span>'
                };
                return `
                    <tr>
                        <td><input type="checkbox" class="code-checkbox" data-phone="${c.user_phone || ''}" onchange="updateDeleteBtn()"></td>
                        <td style="font-weight: 600; letter-spacing: 2px; color: #C41E3A;">${c.code}</td>
                        <td>${statusMap[c.status] || c.status}</td>
                        <td style="font-size: 0.85rem; color: #666;">${c.user_phone || '-'}</td>
                        <td>${c.created_at}</td>
                        <td>${c.expired_at || '-'}</td>
                        <td>${c.used_at || '-'}</td>
                    </tr>
                `;
            }).join('');
        }

        // 全选/取消全选
        function toggleSelectAll() {
            const checked = document.getElementById('selectAll').checked;
            document.querySelectorAll('.code-checkbox').forEach(cb => {
                cb.checked = checked;
            });
            updateDeleteBtn();
        }

        // 更新删除按钮状态
        function updateDeleteBtn() {
            const selected = document.querySelectorAll('.code-checkbox:checked');
            document.getElementById('deleteBtn').disabled = selected.length === 0;
            // 更新全选状态
            const all = document.querySelectorAll('.code-checkbox');
            const checked = document.querySelectorAll('.code-checkbox:checked');
            document.getElementById('selectAll').checked = all.length > 0 && checked.length === all.length;
            document.getElementById('selectAll').indeterminate = checked.length > 0 && checked.length < all.length;
        }

        // 删除选中记录
        function deleteSelected() {
            const selected = document.querySelectorAll('.code-checkbox:checked');
            if (selected.length === 0) return;

            if (!confirm(`确定要删除选中的 ${selected.length} 条记录吗？此操作不可恢复！`)) {
                return;
            }

            const phoneNumbers = [];
            selected.forEach(cb => {
                const phone = cb.dataset.phone;
                if (phone) phoneNumbers.push(phone);
            });

            if (phoneNumbers.length === 0) {
                alert('选中的记录没有手机号信息，无法删除');
                return;
            }

            fetch('/admin/api/codes/delete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone_numbers: phoneNumbers })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert(data.message);
                    loadCodes(currentPage);
                } else {
                    alert(data.message || '删除失败');
                }
            })
            .catch(err => {
                alert('删除失败：' + err);
            });
        }

        function renderPagination(total) {
            const totalPages = Math.ceil(total / limit);
            const container = document.getElementById('pagination');

            let html = '';
            if (currentPage > 1) {
                html += `<button onclick="loadCodes(${currentPage - 1})">上一页</button>`;
            }
            html += `<span style="padding: 8px 15px;">第 ${currentPage} / ${totalPages} 页</span>`;
            if (currentPage < totalPages) {
                html += `<button onclick="loadCodes(${currentPage + 1})">下一页</button>`;
            }

            container.innerHTML = html;
        }

        // 搜索和筛选
        document.getElementById('statusFilter').addEventListener('change', () => loadCodes(1));
        document.getElementById('searchKeyword').addEventListener('input', () => loadCodes(1));

        // 初始加载
        loadCodes();
    </script>
</body>
</html>
