<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>兑换码管理 - HI拿管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #06b6d4;
            --bg-dark: #0f172a;
            --bg-sidebar: #1e293b;
            --bg-card: #1e293b;
            --bg-card-hover: #334155;
            --bg-input: #0f172a;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border: #334155;
            --active-nav: rgba(99,102,241,0.15);
        }
        body { background: var(--bg-dark); color: var(--text-primary); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; min-height: 100vh; }

        /* ===== 侧边栏 ===== */
        .sidebar {
            width: 240px; min-height: 100vh; background: var(--bg-sidebar);
            border-right: 1px solid var(--border); display: flex; flex-direction: column;
            position: fixed; top: 0; left: 0; height: 100vh; z-index: 100;
        }
        .sidebar-logo {
            padding: 24px 20px; border-bottom: 1px solid var(--border);
        }
        .logo-brand { display: flex; align-items: center; gap: 10px; }
        .logo-icon {
            width: 36px; height: 36px; border-radius: 10px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 14px; color: #fff;
        }
        .logo-text .brand { font-size: 1.1rem; font-weight: 700; color: var(--text-primary); }
        .logo-text .sub { font-size: 0.7rem; color: var(--text-secondary); margin-top: 1px; }

        .sidebar-nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; }
        .nav-item {
            display: flex; align-items: center; gap: 12px; padding: 11px 14px;
            border-radius: 10px; text-decoration: none; color: var(--text-secondary);
            font-size: 0.9rem; font-weight: 500; transition: all 0.2s;
            border: 1px solid transparent;
        }
        .nav-item:hover { background: var(--bg-card-hover); color: var(--text-primary); }
        .nav-item.active { background: var(--active-nav); color: var(--primary); border-color: rgba(99,102,241,0.3); }
        .nav-icon { font-size: 1rem; width: 20px; text-align: center; }

        .sidebar-footer {
            padding: 16px 20px; border-top: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }
        .admin-info { display: flex; align-items: center; gap: 10px; }
        .admin-avatar {
            width: 32px; height: 32px; border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem; font-weight: 700; color: #fff;
        }
        .admin-name { font-size: 0.85rem; font-weight: 500; }
        .logout-btn {
            font-size: 0.75rem; color: var(--text-secondary); text-decoration: none;
            padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border);
            transition: all 0.2s;
        }
        .logout-btn:hover { color: var(--danger); border-color: var(--danger); }

        /* ===== 主内容 ===== */
        .main-content { margin-left: 240px; flex: 1; padding: 30px; min-height: 100vh; }

        .page-header { margin-bottom: 24px; }
        .page-title { font-size: 1.6rem; font-weight: 700; color: var(--text-primary); }
        .page-subtitle { font-size: 0.85rem; color: var(--text-secondary); margin-top: 4px; }

        /* ===== 工具栏 ===== */
        .toolbar {
            display: flex; gap: 12px; align-items: center; margin-bottom: 20px; flex-wrap: wrap;
        }
        .search-box {
            display: flex; align-items: center; gap: 10px;
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 10px; padding: 10px 16px; flex: 1; max-width: 300px;
            transition: border-color 0.2s;
        }
        .search-box:focus-within { border-color: var(--primary); }
        .search-box svg { color: var(--text-secondary); flex-shrink: 0; }
        .search-box input {
            background: none; border: none; outline: none; color: var(--text-primary);
            font-size: 0.9rem; width: 100%;
        }
        .search-box input::placeholder { color: var(--text-secondary); }

        .filter-select {
            background: var(--bg-card); border: 1px solid var(--border);
            color: var(--text-primary); padding: 10px 16px; border-radius: 10px;
            font-size: 0.9rem; outline: none; cursor: pointer; transition: border-color 0.2s;
        }
        .filter-select:focus { border-color: var(--primary); }
        .filter-select option { background: var(--bg-sidebar); }

        .btn {
            padding: 10px 18px; border-radius: 10px; border: none; cursor: pointer;
            font-size: 0.875rem; font-weight: 500; display: flex; align-items: center;
            gap: 7px; transition: all 0.2s; text-decoration: none;
        }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: 0 4px 15px rgba(99,102,241,0.4); }
        .btn-ghost { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
        .btn-ghost:hover { background: var(--bg-card-hover); color: var(--text-primary); }
        .btn-danger { background: rgba(239,68,68,0.1); color: var(--danger); border: 1px solid rgba(239,68,68,0.3); }
        .btn-danger:hover { background: rgba(239,68,68,0.2); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

        /* ===== 数据表格 ===== */
        .table-card {
            background: var(--bg-card); border-radius: 16px; border: 1px solid var(--border); overflow: hidden;
        }
        .table-header-bar {
            padding: 18px 24px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .table-title { font-weight: 600; color: var(--text-primary); }
        .table-count { font-size: 0.8rem; color: var(--text-secondary); margin-top: 2px; }

        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th {
            padding: 14px 20px; text-align: left; font-size: 0.78rem; font-weight: 600;
            color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px;
            background: rgba(255,255,255,0.02); border-bottom: 1px solid var(--border);
        }
        .data-table td {
            padding: 16px 20px; border-bottom: 1px solid rgba(51,65,85,0.5);
            font-size: 0.875rem; color: var(--text-primary);
        }
        .data-table tr:last-child td { border-bottom: none; }
        .data-table tr:hover td { background: rgba(255,255,255,0.02); }

        /* 复选框 */
        .cb-wrap { display: flex; align-items: center; justify-content: center; }
        input[type="checkbox"] {
            width: 16px; height: 16px; accent-color: var(--primary); cursor: pointer;
        }

        /* 兑换码样式 */
        .code-text {
            font-family: 'Courier New', monospace; font-weight: 700; font-size: 1.05rem;
            letter-spacing: 2px; color: var(--primary);
        }

        /* 状态标签 */
        .badge {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 500;
        }
        .badge-dot { width: 6px; height: 6px; border-radius: 50%; }
        .badge-used { background: rgba(239,68,68,0.12); color: #f87171; border: 1px solid rgba(239,68,68,0.2); }
        .badge-used .badge-dot { background: var(--danger); }
        .badge-active { background: rgba(16,185,129,0.12); color: #34d399; border: 1px solid rgba(16,185,129,0.2); }
        .badge-active .badge-dot { background: var(--success); }
        .badge-expired { background: rgba(245,158,11,0.12); color: #fbbf24; border: 1px solid rgba(245,158,11,0.2); }
        .badge-expired .badge-dot { background: var(--warning); }
        .badge-pending { background: rgba(148,163,184,0.12); color: var(--text-secondary); border: 1px solid var(--border); }
        .badge-pending .badge-dot { background: var(--text-secondary); }

        /* 手机号 */
        .phone-text { font-family: monospace; color: var(--text-secondary); font-size: 0.85rem; }

        /* 时间 */
        .time-text { font-size: 0.8rem; color: var(--text-secondary); }

        /* 空状态 */
        .empty-state {
            text-align: center; padding: 60px 20px; color: var(--text-secondary);
        }
        .empty-icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.4; }
        .empty-text { font-size: 1rem; font-weight: 500; margin-bottom: 6px; }
        .empty-sub { font-size: 0.85rem; opacity: 0.7; }

        /* ===== 分页 ===== */
        .pagination {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 24px; border-top: 1px solid var(--border);
        }
        .pagination-info { font-size: 0.85rem; color: var(--text-secondary); }
        .pagination-btns { display: flex; gap: 8px; }
        .page-btn {
            padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border);
            background: transparent; color: var(--text-secondary); cursor: pointer;
            font-size: 0.85rem; transition: all 0.2s;
        }
        .page-btn:hover { background: var(--bg-card-hover); color: var(--text-primary); }
        .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* ===== 加载态 ===== */
        .loading-row td { text-align: center; padding: 40px; color: var(--text-secondary); }
        .spinner {
            display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border);
            border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite;
            margin-right: 8px; vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== Toast ===== */
        .toast {
            position: fixed; bottom: 30px; right: 30px; z-index: 9999;
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 12px; padding: 14px 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            display: flex; align-items: center; gap: 10px; transform: translateY(100px);
            transition: transform 0.3s ease; max-width: 350px;
        }
        .toast.show { transform: translateY(0); }
        .toast.success { border-color: rgba(16,185,129,0.4); }
        .toast.error { border-color: rgba(239,68,68,0.4); }
        .toast-icon { font-size: 1.1rem; }
        .toast-msg { font-size: 0.875rem; }
    </style>
</head>
<body>
    <!-- 侧边栏 -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <div class="logo-brand">
                <div class="logo-icon">HI</div>
                <div class="logo-text">
                    <div class="brand">GUSH HI拿</div>
                    <div class="sub">智能派样 SaaS</div>
                </div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <a href="/admin/dashboard" class="nav-item">
                <span class="nav-icon">📊</span><span>仪表盘</span>
            </a>
            <a href="/admin/customers" class="nav-item">
                <span class="nav-icon">🏢</span><span>客户管理</span>
            </a>
            <a href="/admin/codes" class="nav-item active">
                <span class="nav-icon">🎫</span><span>兑换码</span>
            </a>
            <a href="/admin/machines" class="nav-item">
                <span class="nav-icon">📱</span><span>机器管理</span>
            </a>
            <a href="/admin/users" class="nav-item">
                <span class="nav-icon">👥</span><span>用户记录</span>
            </a>
            <a href="/admin/content" class="nav-item">
                <span class="nav-icon">🎨</span><span>内容管理</span>
            </a>
            <a href="/admin/settings" class="nav-item">
                <span class="nav-icon">⚙️</span><span>系统设置</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <div class="admin-info">
                <div class="admin-avatar">A</div>
                <span class="admin-name">{{ session.get('admin_name', 'Admin') }}</span>
            </div>
            <a href="/admin/logout" class="logout-btn">退出</a>
        </div>
    </aside>

    <!-- 主内容 -->
    <main class="main-content">
        <div class="page-header">
            <h1 class="page-title">兑换码管理</h1>
            <p class="page-subtitle">管理所有用户兑换码记录，支持筛选、搜索和批量删除</p>
        </div>

        <!-- 工具栏 -->
        <div class="toolbar">
            <div class="search-box">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                </svg>
                <input type="text" id="searchKeyword" placeholder="搜索兑换码或手机号…">
            </div>
            <select id="statusFilter" class="filter-select">
                <option value="">全部状态</option>
                <option value="pending">未使用</option>
                <option value="used">已使用</option>
                <option value="expired">已过期</option>
            </select>
            <button class="btn btn-ghost" onclick="loadCodes(1)">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/>
                    <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/>
                </svg>
                刷新
            </button>
            <button id="deleteBtn" class="btn btn-danger" onclick="deleteSelected()" disabled>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
                </svg>
                清空所选
            </button>
        </div>

        <!-- 表格 -->
        <div class="table-card">
            <div class="table-header-bar">
                <div>
                    <div class="table-title">兑换码列表</div>
                    <div class="table-count" id="totalCount">加载中…</div>
                </div>
            </div>
            <table class="data-table">
                <thead>
                    <tr>
                        <th style="width:48px">
                            <div class="cb-wrap">
                                <input type="checkbox" id="selectAll" onchange="toggleSelectAll(this)">
                            </div>
                        </th>
                        <th>兑换码</th>
                        <th>状态</th>
                        <th>手机号</th>
                        <th>生成时间</th>
                        <th>过期时间</th>
                        <th>使用时间</th>
                    </tr>
                </thead>
                <tbody id="codeList">
                    <tr class="loading-row"><td colspan="7"><span class="spinner"></span>加载中…</td></tr>
                </tbody>
            </table>
            <div class="pagination">
                <span class="pagination-info" id="pageInfo">-</span>
                <div class="pagination-btns">
                    <button class="page-btn" id="prevBtn" onclick="loadCodes(currentPage - 1)" disabled>上一页</button>
                    <button class="page-btn" id="nextBtn" onclick="loadCodes(currentPage + 1)" disabled>下一页</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Toast 提示 -->
    <div class="toast" id="toast">
        <span class="toast-icon" id="toastIcon"></span>
        <span class="toast-msg" id="toastMsg"></span>
    </div>

    <script>
        let currentPage = 1;
        const limit = 15;

        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            document.getElementById('toastIcon').textContent = type === 'success' ? '✅' : '❌';
            document.getElementById('toastMsg').textContent = msg;
            t.className = 'toast ' + type + ' show';
            setTimeout(() => { t.className = 'toast ' + type; }, 3000);
        }

        function getStatusBadge(status) {
            const map = {
                'used':    '<span class="badge badge-used"><span class="badge-dot"></span>已使用</span>',
                'active':  '<span class="badge badge-active"><span class="badge-dot"></span>有效</span>',
                'expired': '<span class="badge badge-expired"><span class="badge-dot"></span>已过期</span>',
                'pending': '<span class="badge badge-pending"><span class="badge-dot"></span>未使用</span>',
            };
            return map[status] || `<span class="badge badge-pending"><span class="badge-dot"></span>${status}</span>`;
        }

        function loadCodes(page = 1) {
            currentPage = page;
            const keyword = document.getElementById('searchKeyword').value;
            const status = document.getElementById('statusFilter').value;
            let url = `/admin/api/codes?page=${page}&limit=${limit}`;
            if (keyword) url += `&keyword=${encodeURIComponent(keyword)}`;
            if (status) url += `&status=${status}`;

            document.getElementById('codeList').innerHTML = '<tr class="loading-row"><td colspan="7"><span class="spinner"></span>加载中…</td></tr>';

            fetch(url)
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        renderCodes(data.data);
                        const total = data.total || 0;
                        const totalPages = Math.ceil(total / limit);
                        document.getElementById('totalCount').textContent = `共 ${total} 条记录`;
                        document.getElementById('pageInfo').textContent = `第 ${page} / ${totalPages || 1} 页，共 ${total} 条`;
                        document.getElementById('prevBtn').disabled = page <= 1;
                        document.getElementById('nextBtn').disabled = page >= totalPages;
                    } else {
                        document.getElementById('codeList').innerHTML = '<tr class="loading-row"><td colspan="7">加载失败：' + (data.message || '未知错误') + '</td></tr>';
                    }
                })
                .catch(err => {
                    document.getElementById('codeList').innerHTML = '<tr class="loading-row"><td colspan="7">网络错误：' + err + '</td></tr>';
                });
        }

        function renderCodes(codes) {
            const tbody = document.getElementById('codeList');
            if (!codes || codes.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state"><div class="empty-icon">🎫</div><div class="empty-text">暂无兑换码记录</div><div class="empty-sub">用户使用小程序领取后将在此显示</div></div></td></tr>';
                return;
            }
            tbody.innerHTML = codes.map(c => {
                const phone = c.user_phone || c.phone || '-';
                return `<tr>
                    <td><div class="cb-wrap"><input type="checkbox" class="code-checkbox" data-phone="${phone}" onchange="updateDeleteBtn()"></div></td>
                    <td><span class="code-text">${c.code || '-'}</span></td>
                    <td>${getStatusBadge(c.status)}</td>
                    <td><span class="phone-text">${phone}</span></td>
                    <td><span class="time-text">${c.created_at || '-'}</span></td>
                    <td><span class="time-text">${c.expired_at || '-'}</span></td>
                    <td><span class="time-text">${c.used_at || '-'}</span></td>
                </tr>`;
            }).join('');
        }

        function toggleSelectAll(cb) {
            document.querySelectorAll('.code-checkbox').forEach(c => c.checked = cb.checked);
            updateDeleteBtn();
        }

        function updateDeleteBtn() {
            const selected = document.querySelectorAll('.code-checkbox:checked');
            document.getElementById('deleteBtn').disabled = selected.length === 0;
            const all = document.querySelectorAll('.code-checkbox');
            const sa = document.getElementById('selectAll');
            sa.checked = all.length > 0 && selected.length === all.length;
            sa.indeterminate = selected.length > 0 && selected.length < all.length;
        }

        function deleteSelected() {
            const selected = document.querySelectorAll('.code-checkbox:checked');
            if (selected.length === 0) return;
            if (!confirm(`确定要删除选中的 ${selected.length} 条记录吗？此操作不可恢复！`)) return;

            const phoneNumbers = [];
            selected.forEach(cb => { if (cb.dataset.phone && cb.dataset.phone !== '-') phoneNumbers.push(cb.dataset.phone); });
            if (phoneNumbers.length === 0) { showToast('选中的记录没有有效手机号', 'error'); return; }

            fetch('/admin/api/codes/delete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone_numbers: phoneNumbers })
            })
            .then(r => r.json())
            .then(d => {
                if (d.success) { showToast(d.message || '删除成功'); loadCodes(currentPage); }
                else { showToast(d.message || '删除失败', 'error'); }
            })
            .catch(err => showToast('请求失败：' + err, 'error'));
        }

        // 搜索和筛选
        document.getElementById('statusFilter').addEventListener('change', () => loadCodes(1));
        let searchTimer;
        document.getElementById('searchKeyword').addEventListener('input', () => {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => loadCodes(1), 400);
        });

        loadCodes();
    </script>
</body>
</html>
