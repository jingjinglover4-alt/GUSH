<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HI拿 - 智能派样管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-main {
            font-size: 3.5rem;
            font-weight: 800;
            color: #fff;
            letter-spacing: 4px;
            text-shadow: 0 0 30px rgba(196, 30, 58, 0.5);
        }

        .logo-sub {
            font-size: 1.5rem;
            color: #C41E3A;
            font-weight: 600;
            margin-top: 5px;
            letter-spacing: 8px;
        }

        .logo-divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #C41E3A, transparent);
            margin: 15px auto;
        }

        .logo-tagline {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 2px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px 35px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        }

        .login-tabs {
            display: flex;
            margin-bottom: 30px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.08);
            padding: 4px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .login-tab {
            flex: 1;
            text-align: center;
            padding: 14px 10px;
            font-size: 0.95rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 8px;
            letter-spacing: 1px;
        }

        .login-tab.active {
            background: linear-gradient(135deg, #C41E3A 0%, #a01830 100%);
            color: #fff;
            box-shadow: 0 4px 12px rgba(196, 30, 58, 0.3);
        }

        .login-tab:hover:not(.active) {
            color: rgba(255, 255, 255, 0.9);
            background: rgba(255, 255, 255, 0.1);
        }

        .login-title {
            font-size: 1.3rem;
            color: #fff;
            text-align: center;
            margin-bottom: 30px;
            font-weight: 500;
        }

        .login-form {
            transition: all 0.3s ease;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .form-input {
            width: 100%;
            padding: 15px 18px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            font-size: 1rem;
            color: #fff;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .form-input:focus {
            border-color: #C41E3A;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 0 3px rgba(196, 30, 58, 0.2);
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #C41E3A 0%, #a01830 100%);
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 3px;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(196, 30, 58, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-msg {
            color: #ff6b6b;
            font-size: 0.85rem;
            text-align: center;
            margin-top: 15px;
            min-height: 20px;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.8rem;
        }

        .footer span {
            color: #C41E3A;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-section">
            <div class="logo-main">GUSH</div>
            <div class="logo-sub">HI拿</div>
            <div class="logo-divider"></div>
            <div class="logo-tagline">智能派样管理系统</div>
        </div>

        <div class="login-card">
            <div class="login-title">HI拿智能派样系统</div>
            
            <!-- 身份选择标签页 -->
            <div class="login-tabs">
                <div class="login-tab active" id="tabAdmin" onclick="switchTab('admin')">
                    🏢 超级管理员
                </div>
                <div class="login-tab" id="tabMerchant" onclick="switchTab('merchant')">
                    🏪 SaaS商户
                </div>
            </div>

            <!-- 管理员登录表单 -->
            <div id="adminForm" class="login-form">
                <div class="form-group">
                    <label class="form-label">管理员账号</label>
                    <input type="text" class="form-input" id="adminUsername" placeholder="请输入超级管理员账号" autocomplete="off">
                </div>

                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-input" id="adminPassword" placeholder="请输入密码">
                </div>
            </div>

            <!-- 商户登录表单 -->
            <div id="merchantForm" class="login-form" style="display: none;">
                <div class="form-group">
                    <label class="form-label">商户账号</label>
                    <input type="text" class="form-input" id="merchantUsername" placeholder="请输入商户账号" autocomplete="off">
                </div>

                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-input" id="merchantPassword" placeholder="请输入密码">
                </div>
            </div>

            <button class="login-btn" id="loginBtn" onclick="doLogin()">登 录</button>

            <div class="error-msg" id="errorMsg"></div>
        </div>

        <div class="footer">
            <span>GUSH</span> 高效传媒 © 2026
        </div>
    </div>

    <script>
        // 当前登录类型：'admin' 或 'merchant'
        let currentLoginType = 'admin';

        // 切换标签页
        function switchTab(type) {
            currentLoginType = type;
            
            // 更新标签页样式
            document.getElementById('tabAdmin').classList.remove('active');
            document.getElementById('tabMerchant').classList.remove('active');
            document.getElementById('adminForm').style.display = 'none';
            document.getElementById('merchantForm').style.display = 'none';
            
            if (type === 'admin') {
                document.getElementById('tabAdmin').classList.add('active');
                document.getElementById('adminForm').style.display = 'block';
                document.title = 'HI拿 - 超级管理员登录';
            } else {
                document.getElementById('tabMerchant').classList.add('active');
                document.getElementById('merchantForm').style.display = 'block';
                document.title = 'HI拿 - SaaS商户登录';
            }
            
            // 清空错误消息
            document.getElementById('errorMsg').textContent = '';
        }

        // 回车登录
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                doLogin();
            }
        });

        function doLogin() {
            let username, password;
            
            // 根据当前类型获取对应的表单值
            if (currentLoginType === 'admin') {
                username = document.getElementById('adminUsername').value.trim();
                password = document.getElementById('adminPassword').value;
            } else {
                username = document.getElementById('merchantUsername').value.trim();
                password = document.getElementById('merchantPassword').value;
            }
            
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');

            if (!username || !password) {
                errorMsg.textContent = '请输入账号和密码';
                return;
            }

            btn.disabled = true;
            btn.textContent = '登录中...';
            errorMsg.textContent = '';

            // 发送登录请求，包含登录类型
            fetch('/admin/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    username, 
                    password,
                    login_type: currentLoginType  // 'admin' 或 'merchant'
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    window.location.href = '/admin/dashboard';
                } else {
                    errorMsg.textContent = data.message || '登录失败';
                    btn.disabled = false;
                    btn.textContent = '登 录';
                }
            })
            .catch(err => {
                errorMsg.textContent = '网络错误，请重试';
                btn.disabled = false;
                btn.textContent = '登 录';
            });
        }

        // 页面加载时默认选择管理员标签
        document.addEventListener('DOMContentLoaded', function() {
            switchTab('admin');
        });
    </script>
</body>
</html>
