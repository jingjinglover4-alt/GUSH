# 硬件网关WebSocket代理配置
# 将此配置包含到主Nginx配置中，或放置在 /etc/nginx/conf.d/ 目录下

server {
    listen 5003 ssl;
    server_name cdgushai.com;  # 使用现有域名
    
    # SSL证书（复用现有证书）
    ssl_certificate /www/server/panel/vhost/ssl/cdgushai.com/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/ssl/cdgushai.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    
    # WebSocket代理
    location / {
        proxy_pass http://127.0.0.1:5003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 超时设置
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 75s;
    }
    
    # 健康检查
    location /health {
        proxy_pass http://127.0.0.1:5003/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}