<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>兑换码领取 - GUSH AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #8B1A2D 0%, #A52A3A 25%, #B83A4A 50%, #A52A3A 75%, #8B1A2D 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
            overflow-x: hidden;
        }
        
        /* 渐变光晕 */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 107, 107, 0.3) 0%, transparent 50%),
                        radial-gradient(circle at 70% 70%, rgba(139, 26, 45, 0.4) 0%, transparent 50%);
            pointer-events: none;
            animation: glow 8s ease-in-out infinite;
        }
        
        @keyframes glow {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-5%, -5%); }
        }
        
        /* 网格背景 */
        body::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }
        
        /* Logo */
        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.15);
            padding: 12px 24px;
            border-radius: 16px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            z-index: 1;
        }
        
        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #FF4757 0%, #FF3838 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        
        .logo-text {
            text-align: left;
        }
        
        .logo-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: 1px;
        }
        
        .logo-subtitle {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 2px;
        }
        
        /* 主标题 */
        .main-title {
            font-size: 1.5rem;
            color: #fff;
            font-weight: 600;
            text-align: center;
            line-height: 1.5;
            margin-bottom: 40px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
            position: relative;
            z-index: 1;
        }
        
        /* 兑换卡片 */
        .redeem-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.3);
            position: relative;
            z-index: 1;
        }
        
        .card-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #333;
            text-align: center;
            margin-bottom: 30px;
        }
        
        /* 6位输入框 */
        .code-input-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }
        
        .code-box {
            width: 48px;
            height: 60px;
            background: #f5f5f5;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1.8rem;
            font-weight: 700;
            text-align: center;
            color: #333;
            transition: all 0.3s ease;
            caret-color: #FF4757;
        }
        
        .code-box:focus {
            border-color: #FF4757;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(255, 71, 87, 0.2);
            outline: none;
        }
        
        .code-box.filled {
            border-color: #FF4757;
            background: #fff5f5;
        }
        
        /* 隐藏的真实输入框 */
        .hidden-input {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }
        
        /* 领取按钮 */
        .claim-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #FF4757 0%, #FF3838 100%);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 71, 87, 0.4);
            transition: all 0.3s ease;
        }
        
        .claim-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(255, 71, 87, 0.5);
        }
        
        .claim-btn:disabled {
            background: #ccc;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }
        
        /* 提示文字 */
        .tip {
            text-align: center;
            color: #999;
            font-size: 0.85rem;
            margin-top: 20px;
        }
        
        /* 返回首页 */
        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
            z-index: 10;
        }
        
        .back-link:hover {
            color: #fff;
        }
        
        /* 消息提示 */
        .message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            text-align: center;
            display: none;
        }
        
        .message.success {
            display: block;
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }
        
        .message.error {
            display: block;
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        
        /* 成功动画 */
        .success-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        
        .success-overlay.show {
            display: flex;
        }
        
        .success-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            margin-bottom: 30px;
            animation: pop 0.5s ease;
        }
        
        @keyframes pop {
            0% { transform: scale(0); }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        .success-text {
            color: #fff;
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .success-sub {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <!-- 返回链接 -->
    <a href="/" class="back-link">← 返回首页</a>
    
    <!-- Logo -->
    <div class="logo-section">
        <div class="logo-icon">🚀</div>
        <div class="logo-text">
            <div class="logo-title">Gush AI</div>
            <div class="logo-subtitle">成都高效文化传播有限公司</div>
        </div>
    </div>
    
    <!-- 主标题 -->
    <h1 class="main-title">输入兑换码领取精美礼品</h1>
    
    <!-- 兑换卡片 -->
    <div class="redeem-card">
        <div class="card-title">请输入6位兑换码</div>
        
        <!-- 6位输入框 -->
        <div class="code-input-container" id="codeContainer">
            <input type="text" class="code-box" maxlength="1" data-index="0" inputmode="numeric" pattern="[0-9]">
            <input type="text" class="code-box" maxlength="1" data-index="1" inputmode="numeric" pattern="[0-9]">
            <input type="text" class="code-box" maxlength="1" data-index="2" inputmode="numeric" pattern="[0-9]">
            <input type="text" class="code-box" maxlength="1" data-index="3" inputmode="numeric" pattern="[0-9]">
            <input type="text" class="code-box" maxlength="1" data-index="4" inputmode="numeric" pattern="[0-9]">
            <input type="text" class="code-box" maxlength="1" data-index="5" inputmode="numeric" pattern="[0-9]">
        </div>
        
        <!-- 领取按钮 -->
        <button class="claim-btn" id="claimBtn" onclick="submitCode()" disabled>点击领取</button>
        
        <!-- 消息提示 -->
        <div class="message" id="message"></div>
        
        <!-- 提示 -->
        <div class="tip">兑换码可在活动页面获取</div>
    </div>
    
    <!-- 成功弹窗 -->
    <div class="success-overlay" id="successOverlay">
        <div class="success-icon">✓</div>
        <div class="success-text">领取成功</div>
        <div class="success-sub">请到派样机领取您的礼品</div>
    </div>
    
    <script>
        const codeBoxes = document.querySelectorAll('.code-box');
        const claimBtn = document.getElementById('claimBtn');
        const message = document.getElementById('message');
        
        // 自动聚焦下一个输入框
        codeBoxes.forEach((box, index) => {
            box.addEventListener('input', (e) => {
                const value = e.target.value.replace(/[^0-9]/g, '');
                e.target.value = value;
                
                if (value) {
                    e.target.classList.add('filled');
                    if (index < 5) {
                        codeBoxes[index + 1].focus();
                    }
                } else {
                    e.target.classList.remove('filled');
                }
                
                checkComplete();
            });
            
            // 删除键
            box.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    codeBoxes[index - 1].focus();
                    codeBoxes[index - 1].value = '';
                    codeBoxes[index - 1].classList.remove('filled');
                    checkComplete();
                }
            });
            
            // 点击聚焦
            box.addEventListener('click', () => {
                box.focus();
            });
        });
        
        // 检查是否输入完整
        function checkComplete() {
            const code = Array.from(codeBoxes).map(b => b.value).join('');
            claimBtn.disabled = code.length !== 6;
        }
        
        // 提交兑换码
        async function submitCode() {
            const code = Array.from(codeBoxes).map(b => b.value).join('').toUpperCase();
            
            if (code.length !== 6) {
                message.className = 'message error';
                message.textContent = '请输入完整的6位兑换码';
                return;
            }
            
            claimBtn.disabled = true;
            claimBtn.textContent = '验证中...';
            message.className = 'message';
            message.textContent = '';
            
            try {
                const response = await fetch('/api/redeem_code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: code, machine_id: 'M001' }),
                });
                
                const data = await response.json();
                
                if (data.code === 200) {
                    // 显示成功弹窗
                    document.getElementById('successOverlay').classList.add('show');
                } else {
                    message.className = 'message error';
                    message.textContent = data.message || '兑换码无效';
                    claimBtn.disabled = false;
                    claimBtn.textContent = '点击领取';
                }
            } catch (error) {
                message.className = 'message error';
                message.textContent = '网络错误，请重试';
                claimBtn.disabled = false;
                claimBtn.textContent = '点击领取';
            }
        }
        
        // 点击成功弹窗关闭
        document.getElementById('successOverlay').addEventListener('click', () => {
            document.getElementById('successOverlay').classList.remove('show');
        });
        
        // 第一个框自动聚焦
        codeBoxes[0].focus();
    </script>
</body>
</html>
